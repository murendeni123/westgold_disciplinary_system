<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/classly_icon.PNG" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classly</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Classly" />
    <link rel="apple-touch-icon" href="/classly_icon.PNG" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#3B82F6" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="0EUML9f38ykeD_5Von2lN9CwyOHW1bfRxMTy-9F8nU0" />
  </head>
  <body>
    <div id="root">
      <!-- Loading indicator shown until React mounts -->
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div style="text-align: center;">
          <div style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
          <p style="color: white; font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 500;">Loading Classly...</p>
        </div>
      </div>
      <style>
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // In dev mode, unregister any cached SW so Vite HMR works correctly
          if (location.hostname === 'localhost' || location.port === '3001') {
            navigator.serviceWorker.getRegistrations().then(regs => {
              regs.forEach(r => r.unregister());
            });
          } else {
            navigator.serviceWorker.register('/sw.js')
              .then(r => console.log('Service Worker registered:', r))
              .catch(e => console.log('Service Worker registration failed:', e));
          }
        });
      }
    </script>
  </body>
</html>
